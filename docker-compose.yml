version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: campusvisa_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: campusvisa_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  celery:
    build: .
    container_name: campusvisa_celery
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      - redis
