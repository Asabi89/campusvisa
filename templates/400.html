{% load static %}
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur 400 - Mauvaise requête | Visanextstep</title>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #0055A4; }
        .text-marine { color: #0055A4; }
        .text-visaRed { color: #EF4135; }
        .bg-visaRed { background-color: #EF4135; }
    </style>
</head>
<body class="flex flex-col min-h-screen antialiased">
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="https://nextstepc.com" class="flex items-center gap-2">
                    <span class="text-2xl font-bold tracking-tight text-marine">Visa<span class="text-visaRed">nextstep</span></span>
                </a>
            </div>
        </div>
    </header>
    <main class="flex-grow flex items-center justify-center bg-gray-50 px-4 py-16 sm:px-6 sm:py-24 lg:px-8">
        <div class="max-w-max mx-auto text-center">
            <img src="{% static 'img/error_400.png' %}" alt="Erreur 400" class="mx-auto h-64 sm:h-80 w-auto mb-8 animate-bounce" style="animation-duration: 3s;">
            <h1 class="text-4xl font-extrabold text-marine tracking-tight sm:text-5xl">400</h1>
            <p class="mt-2 text-lg font-medium text-gray-900">Oups ! Mauvaise requête.</p>
            <p class="mt-2 text-base text-gray-500">Il semble que votre navigateur ait envoyé une requête que nous n'avons pas comprise.</p>
            <div class="mt-6 flex justify-center space-x-4">
                <a href="https://nextstepc.com" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-visaRed hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-visaRed transition-colors duration-200">
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </main>
</body>
</html>
