{% extends "base.html" %}
{% load static %}

{% block title %}Erreur 400 - Mauvaise requête{% endblock %}

{% block content %}
<main class="flex-grow flex items-center justify-center bg-gray-50 px-4 py-16 sm:px-6 sm:py-24 lg:px-8">
    <div class="max-w-max mx-auto text-center">
        <img src="{% static 'img/error_400.png' %}" alt="Erreur 400" class="mx-auto h-64 sm:h-80 w-auto mb-8 animate-bounce" style="animation-duration: 3s;">
        <h1 class="text-4xl font-extrabold text-marine tracking-tight sm:text-5xl">400</h1>
        <p class="mt-2 text-lg font-medium text-gray-900">Oups ! Mauvaise requête.</p>
        <p class="mt-2 text-base text-gray-500">Il semble que votre navigateur ait envoyé une requête que nous n'avons pas comprise.</p>
        <div class="mt-6 flex justify-center space-x-4">
            <a href="{% url 'home' %}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-visaRed hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-visaRed transition-colors duration-200">
                Retour à l'accueil
            </a>
        </div>
    </div>
</main>
{% endblock %}
