{% extends "base.html" %}
{% load static %}

{% block title %}Erreur 403 - Accès refusé{% endblock %}

{% block content %}
<main class="flex-grow flex items-center justify-center bg-gray-50 px-4 py-16 sm:px-6 sm:py-24 lg:px-8">
    <div class="max-w-max mx-auto text-center">
        <img src="{% static 'img/error_403.png' %}" alt="Erreur 403" class="mx-auto h-64 sm:h-80 w-auto mb-8 transition-transform duration-500 hover:scale-105">
        <h1 class="text-4xl font-extrabold text-marine tracking-tight sm:text-5xl">403</h1>
        <p class="mt-2 text-lg font-medium text-gray-900">Halte ! Accès refusé.</p>
        <p class="mt-2 text-base text-gray-500">Notre gardien de sécurité virtuel indique que vous n'avez pas l'autorisation d'accéder à cette page.</p>
        <div class="mt-6 flex justify-center space-x-4">
            <a href="{% url 'home' %}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-full shadow-sm text-white bg-visaRed hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-visaRed transition-colors duration-200">
                Retour à l'accueil
            </a>
            <a href="{% url 'account_login' %}" class="inline-flex items-center px-6 py-3 border border-gray-300 text-base font-medium rounded-full shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-marine transition-colors duration-200">
                Se connecter
            </a>
        </div>
    </div>
</main>
{% endblock %}
