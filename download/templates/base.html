<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SaveAll{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #002654;
            --secondary-soft: #18457a;
            --border: #d2deeb;
            --surface: #f6f9fd;
            --text-muted: #5e7796;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            color: var(--secondary);
            background:
                radial-gradient(circle at 10% 15%, rgba(0, 38, 84, 0.08), transparent 35%),
                radial-gradient(circle at 90% 80%, rgba(0, 38, 84, 0.07), transparent 40%),
                var(--primary);
        }

        .wrap {
            width: min(1200px, 94vw);
            margin: 0 auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.92);
        }

        .topbar-inner {
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-family: Satoshi, sans-serif;
            font-size: 1.55rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--secondary);
            text-decoration: none;
        }

        .brand span { color: var(--secondary-soft); }

        .hero {
            padding: 48px 0 32px;
            display: grid;
            gap: 24px;
            grid-template-columns: 1.2fr 0.8fr;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-family: Satoshi, sans-serif;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .hero p {
            margin: 0;
            max-width: 60ch;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .hero-card {
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--primary);
            padding: 20px;
            box-shadow: 0 18px 40px rgba(0, 38, 84, 0.1);
        }

        .platform-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .platform {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            background: #fff;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 18px;
            align-items: start;
            padding-bottom: 36px;
        }

        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 26px rgba(0, 38, 84, 0.08);
        }

        .mode-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .mode-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--secondary);
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--secondary);
            color: #fff;
            border-color: var(--secondary);
        }

        .input-block { display: none; }
        .input-block.active { display: block; }

        label {
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-size: 0.73rem;
            font-weight: 800;
            color: var(--text-muted);
        }

        input[type="text"], textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 13px;
            font-family: Inter, sans-serif;
            font-size: 0.91rem;
            color: var(--secondary);
            background: #fff;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 160px;
            line-height: 1.5;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--secondary-soft);
            box-shadow: 0 0 0 4px rgba(0, 38, 84, 0.1);
        }

        .button-row {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.84rem;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-main {
            background: var(--secondary);
            color: #fff;
        }

        .btn-ghost {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--secondary);
        }

        .btn-main:disabled, .btn-ghost:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .hint {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .section-title {
            margin: 18px 0 10px;
            font-size: 0.98rem;
            font-weight: 800;
            font-family: Satoshi, sans-serif;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 10px;
        }

        .preview-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .preview-media {
            aspect-ratio: 16 / 9;
            background: var(--surface);
            display: grid;
            place-items: center;
            color: var(--text-muted);
            font-size: 0.82rem;
            text-align: center;
            padding: 8px;
        }

        .preview-media img, .preview-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .preview-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 138px;
        }

        .preview-title {
            margin: 0;
            font-size: 0.84rem;
            font-weight: 800;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 7px;
            text-transform: uppercase;
        }

        .warning {
            margin: 0;
            font-size: 0.73rem;
            color: var(--text-muted);
            line-height: 1.35;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tiny {
            font-size: 0.73rem;
            padding: 8px 10px;
            border-radius: 8px;
        }

        .progress-card {
            margin-top: 14px;
            display: none;
        }

        .progress-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.86rem;
            font-weight: 700;
        }

        .progress-bar {
            height: 8px;
            border-radius: 999px;
            background: var(--surface);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--secondary), var(--secondary-soft));
            transition: width 0.25s ease;
        }

        .job-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .job-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .job-msg {
            font-size: 0.78rem;
            font-weight: 700;
        }

        .save-link {
            text-decoration: none;
            color: #fff;
            background: var(--secondary);
            border-radius: 7px;
            padding: 6px 8px;
            font-size: 0.72rem;
            font-weight: 800;
        }

        .sidebar { display: grid; gap: 10px; }

        .ad-mini {
            border: 1px dashed #9bb4cf;
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff, #f4f8fd);
            padding: 12px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ad-mini h4 {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 800;
            font-family: Satoshi, sans-serif;
        }

        .ad-mini p {
            margin: 6px 0 0;
            font-size: 0.76rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .foot {
            border-top: 1px solid var(--border);
            padding: 16px 0 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 980px) {
            .hero { grid-template-columns: 1fr; }
            .layout { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="wrap topbar-inner">
            <a class="brand" href="/">Save<span>All</span></a>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="foot">
        SaveAll - Bulk and individual social video downloader.
    </footer>
    {% block extra_js %}{% endblock %}
</body>
</html>
